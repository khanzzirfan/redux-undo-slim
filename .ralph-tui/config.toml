# Ralph TUI Configuration
# Generated by setup wizard
# See: ralph-tui config help

configVersion = "2.1"
tracker = "json"
agent = "opencode"
maxIterations = 800
autoCommit = true

[trackerOptions]
[agentOptions]


[errorHandling]
strategy = "retry"
maxRetries = 5
retryDelayMs = 10000
 
[rateLimitHandling]
enabled = true
maxRetries = 5
baseBackoffMs = 10000

# ─────────────────────────────────────────────
# Parallel Execution
# ─────────────────────────────────────────────
 
[parallel]
# Mode: "auto" (analyze dependencies), "always" (force parallel), "never" (disable)
mode = "auto"
 
# Maximum concurrent workers (git worktrees)
maxWorkers = 3
 
# Directory for worker worktrees (relative to project root)
worktreeDir = ".ralph-tui/worktrees"